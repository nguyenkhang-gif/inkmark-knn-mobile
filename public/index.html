<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NoteScaner</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #2563eb;
      --danger: #dc2626;
      --text: #eee;
      --muted: #888;
      --header-h: 52px;
      --nav-h: 62px;
    }

    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; }
    #status {
      font-size: 0.78rem;
      color: #6ee7b7;
      text-align: right;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #status.error { color: #f87171; }

    /* ── Main scrollable area ── */
    main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .section { display: none; padding: 16px; min-height: 100%; }
    .section.active { display: block; }

    /* ── Bottom nav ── */
    nav {
      height: var(--nav-h);
      display: flex;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--surface);
    }
    nav button {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.65rem;
      cursor: pointer;
      padding: 6px 4px;
      transition: color 0.15s;
      position: relative;
    }
    nav button .icon { font-size: 1.3rem; line-height: 1; }
    nav button.active { color: var(--accent); }
    nav button.active::after {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 2px;
      background: var(--accent);
      border-radius: 0 0 4px 4px;
    }
    nav button#nav-result .badge {
      position: absolute;
      top: 6px; right: calc(50% - 18px);
      width: 8px; height: 8px;
      background: #6ee7b7;
      border-radius: 50%;
      display: none;
    }
    nav button#nav-result.has-result .badge { display: block; }

    /* ── Shared components ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; border: none; padding: 11px 16px; font-weight: 500; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #334155; cursor: not-allowed; }
    .btn-secondary { background: transparent; border: 1px solid #444; color: #ccc; }
    .btn-secondary:hover { border-color: #888; }
    .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .btn-row { display: flex; gap: 8px; width: 100%; }
    .btn-row .btn { flex: 1; }

    /* ── Scan section ── */
    .input-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .input-tab {
      flex: 1; padding: 9px; border: 1px solid #333; border-radius: 8px;
      background: transparent; color: var(--muted); cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
    }
    .input-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    #cameraSection, #uploadSection { display: none; flex-direction: column; gap: 12px; }
    #cameraSection.active, #uploadSection.active { display: flex; }

    video, #preview {
      width: 100%; border-radius: 10px; background: #000;
      max-height: 55vw; object-fit: cover;
    }

    .drop-zone {
      border: 2px dashed #333; border-radius: 10px;
      padding: 36px 20px; text-align: center; color: #555;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); color: #aaa; }
    .drop-zone input { display: none; }
    .drop-zone .drop-icon { font-size: 2rem; margin-bottom: 8px; }
    .drop-zone p { font-size: 0.9rem; }
    .drop-zone small { font-size: 0.75rem; color: #444; margin-top: 4px; display: block; }

    #uploadPreview { display:none; width:100%; border-radius:10px; max-height:260px; object-fit:contain; }

    /* ── Gallery section ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .img-cell {
      position: relative; border-radius: 8px; overflow: hidden;
      border: 2px solid transparent; transition: border-color 0.15s; aspect-ratio: 1;
    }
    .img-cell.selected { border-color: var(--accent); }
    .img-cell img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
    .img-cell .actions {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; gap: 2px; padding: 4px;
      background: rgba(0,0,0,0.7); opacity: 0; transition: opacity 0.15s;
    }
    .img-cell:hover .actions, .img-cell.selected .actions { opacity: 1; }
    .img-cell .actions button {
      flex: 1; padding: 5px 0; font-size: 0.7rem;
      border: none; border-radius: 4px; cursor: pointer; font-weight: 600;
    }
    .img-cell .scan-btn { background: var(--accent); color: #fff; }
    .img-cell .scan-btn:disabled { background: #334155; cursor: not-allowed; }
    .img-cell .del-btn { background: var(--danger); color: #fff; }

    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-top: 12px; font-size: 0.85rem; color: var(--muted);
    }
    .pagination button {
      padding: 6px 16px; background: transparent; border: 1px solid #444;
      border-radius: 6px; color: #ccc; cursor: pointer; font-size: 0.85rem;
    }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

    .gallery-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .gallery-empty { color: #555; font-size: 0.85rem; text-align: center; padding: 24px; }

    /* ── Notes section ── */
    .notes-list { display: flex; flex-direction: column; gap: 6px; }
    .note-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 10px;
      background: #111; border: 1px solid #222;
      cursor: pointer; transition: border-color 0.15s;
    }
    .note-item:hover { border-color: var(--accent); }
    .note-icon { font-size: 1.1rem; flex-shrink: 0; }
    .note-name { font-size: 0.85rem; color: #ccc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .note-del {
      background: transparent; border: 1px solid #444; border-radius: 6px;
      color: #666; font-size: 0.75rem; padding: 4px 10px; cursor: pointer; flex-shrink: 0;
    }
    .note-del:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Result section ── */
    .result-toolbar {
      display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .result-toolbar .btn { flex: 1; min-width: 100px; font-size: 0.85rem; padding: 9px; }
    .result-filename {
      font-size: 0.78rem; color: var(--muted);
      margin-bottom: 12px; word-break: break-all;
    }

    /* ── Markdown body ── */
    .markdown-body { color: #d4d4d4; line-height: 1.7; font-size: 0.95rem; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #fff; margin: 1em 0 0.4em; }
    .markdown-body h1 { font-size: 1.25rem; border-bottom: 1px solid #333; padding-bottom: 6px; }
    .markdown-body h2 { font-size: 1.05rem; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.4em; }
    .markdown-body li { margin: 4px 0; }
    .markdown-body input[type="checkbox"] { margin-right: 6px; accent-color: var(--accent); }
    .markdown-body table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .markdown-body th, .markdown-body td { border: 1px solid #333; padding: 6px 8px; }
    .markdown-body th { background: #222; }
    .markdown-body code { background: #222; padding: 2px 5px; border-radius: 4px; font-size: 0.85em; }
    .markdown-body pre { background: #111; padding: 12px; border-radius: 8px; overflow-x: auto; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body blockquote { border-left: 3px solid #444; margin: 0; padding-left: 12px; color: #888; }
    .markdown-body .mermaid {
      background: #0f172a; border: 1px solid #334155; border-radius: 10px;
      padding: 20px 12px; margin: 12px 0; overflow-x: auto; display: flex; justify-content: center;
    }
    .markdown-body .mermaid svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <header>
    <h1>NoteScaner</h1>
    <span id="status"></span>
  </header>

  <!-- Scrollable content -->
  <main>

    <!-- SCAN -->
    <section id="sec-scan" class="section active">
      <div class="input-tabs">
        <button class="input-tab active" onclick="switchInputTab('camera')">Camera</button>
        <button class="input-tab" onclick="switchInputTab('upload')">Upload</button>
      </div>

      <div id="cameraSection" class="active">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none"></canvas>
        <div class="btn-row">
          <button class="btn btn-secondary" id="startBtn" onclick="startCamera()">Start Camera</button>
          <button class="btn btn-primary" id="snapBtn" onclick="snap()" disabled>Capture</button>
        </div>
        <img id="preview" style="display:none" />
        <div class="btn-row" id="saveRow" style="display:none">
          <button class="btn btn-secondary" onclick="discardSnap()">Retake</button>
          <button class="btn btn-primary" onclick="saveSnap()">Save Image</button>
        </div>
      </div>

      <div id="uploadSection">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
             ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="onFileSelected(event)" />
          <div class="drop-icon">📷</div>
          <p id="dropText">Tap to take a photo or choose from gallery</p>
          <small>JPG, PNG supported</small>
        </div>
        <img id="uploadPreview" />
        <button class="btn btn-primary" id="uploadBtn" onclick="uploadFile()" style="display:none">Save Image</button>
      </div>
    </section>

    <!-- IMAGES -->
    <section id="sec-images" class="section">
      <div class="gallery-header">
        <span class="card-title" style="margin:0">Images</span>
        <button class="btn btn-danger" style="padding:6px 12px;font-size:0.78rem;border-radius:6px" onclick="deleteAll()">Delete All</button>
      </div>
      <div class="gallery-grid" id="gallery"></div>
      <div class="pagination" id="pagination" style="display:none">
        <button id="prevBtn" onclick="changePage(-1)">← Prev</button>
        <span id="pageInfo"></span>
        <button id="nextBtn" onclick="changePage(1)">Next →</button>
      </div>
    </section>

    <!-- NOTES -->
    <section id="sec-notes" class="section">
      <div class="gallery-header">
        <span class="card-title" style="margin:0">Saved Notes</span>
        <button class="btn btn-secondary" style="padding:6px 12px;font-size:0.78rem;border-radius:6px" onclick="loadNotes()">Refresh</button>
      </div>
      <div class="notes-list" id="notesList"></div>
    </section>

    <!-- RESULT -->
    <section id="sec-result" class="section">
      <div class="result-filename" id="resultFilename"></div>
      <div class="result-toolbar">
        <button class="btn btn-secondary" onclick="copyResult()">Copy MD</button>
        <button class="btn btn-primary" onclick="downloadResult()">Download .md</button>
      </div>
      <div class="markdown-body" id="resultContent"></div>
    </section>

  </main>

  <!-- Bottom nav -->
  <nav>
    <button id="nav-scan" class="active" onclick="showSection('scan')">
      <span class="icon">📷</span>Scan
    </button>
    <button id="nav-images" onclick="showSection('images')">
      <span class="icon">🖼</span>Images
    </button>
    <button id="nav-notes" onclick="showSection('notes')">
      <span class="icon">📝</span>Notes
    </button>
    <button id="nav-result" onclick="showSection('result')">
      <span class="icon">📄</span>Result
      <span class="badge"></span>
    </button>
  </nav>

  <script>
    // ── Navigation ──
    function showSection(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById(`sec-${name}`).classList.add('active');
      document.getElementById(`nav-${name}`).classList.add('active');
    }

    // ── Input tabs (Camera / Upload) ──
    function switchInputTab(tab) {
      document.querySelectorAll('.input-tab').forEach((t, i) =>
        t.classList.toggle('active', (i === 0) === (tab === 'camera'))
      );
      document.getElementById('cameraSection').classList.toggle('active', tab === 'camera');
      document.getElementById('uploadSection').classList.toggle('active', tab === 'upload');
    }

    // ── Status ──
    const statusEl = document.getElementById('status');
    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = isError ? 'error' : '';
    }

    // ── Camera ──
    let stream = null, snapBlob = null;
    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const snapBtn = document.getElementById('snapBtn');
    const saveRow = document.getElementById('saveRow');

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        video.srcObject = stream;
        snapBtn.disabled = false;
        document.getElementById('startBtn').disabled = true;
        setStatus('Camera ready');
      } catch (e) { setStatus('Camera error: ' + e.message, true); }
    }

    function snap() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.toBlob(blob => {
        snapBlob = blob;
        preview.src = URL.createObjectURL(blob);
        preview.style.display = 'block';
        video.style.display = 'none';
        saveRow.style.display = 'flex';
        snapBtn.disabled = true;
        setStatus('Preview ready — save or retake');
      }, 'image/jpeg', 0.92);
    }

    function discardSnap() {
      snapBlob = null;
      preview.style.display = 'none';
      video.style.display = 'block';
      saveRow.style.display = 'none';
      snapBtn.disabled = false;
      setStatus('');
    }

    async function saveSnap() {
      if (!snapBlob) return;
      const form = new FormData();
      form.append('image', snapBlob, 'capture.jpg');
      await sendUpload(form);
      discardSnap();
    }

    // ── Upload ──
    let uploadFileObj = null;
    function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
    function onDragLeave(e) { document.getElementById('dropZone').classList.remove('drag-over'); }
    function onDrop(e) {
      e.preventDefault();
      document.getElementById('dropZone').classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) previewUpload(file);
    }
    function onFileSelected(e) { if (e.target.files[0]) previewUpload(e.target.files[0]); }

    function previewUpload(file) {
      uploadFileObj = file;
      const up = document.getElementById('uploadPreview');
      up.src = URL.createObjectURL(file);
      up.style.display = 'block';
      document.getElementById('uploadBtn').style.display = 'block';
      setStatus('Ready to save');
    }

    async function uploadFile() {
      if (!uploadFileObj) return;
      const form = new FormData();
      form.append('image', uploadFileObj, uploadFileObj.name);
      await sendUpload(form);
      uploadFileObj = null;
      document.getElementById('uploadPreview').style.display = 'none';
      document.getElementById('uploadBtn').style.display = 'none';
    }

    async function sendUpload(form) {
      setStatus('Saving...');
      try {
        const res = await fetch('/upload', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Upload failed');
        setStatus(`Saved — ${data.filename}`);
        loadGallery();
        showSection('images');
      } catch (e) { setStatus(e.message, true); }
    }

    // ── Mermaid & Marked ──
    mermaid.initialize({
      startOnLoad: false, theme: 'dark', securityLevel: 'loose', useMaxWidth: true,
      themeVariables: {
        primaryColor: '#1e3a5f', primaryTextColor: '#e2e8f0', primaryBorderColor: '#334155',
        lineColor: '#64748b', secondaryColor: '#0f172a', tertiaryColor: '#1e293b',
        background: '#0f172a', mainBkg: '#1e293b', nodeBorder: '#334155',
        clusterBkg: '#1e293b', titleColor: '#94a3b8', edgeLabelBackground: '#1e293b',
        fontFamily: 'ui-monospace, monospace',
      },
      flowchart: { htmlLabels: false, curve: 'basis' },
    });
    marked.setOptions({ breaks: true, gfm: true });

    // ── Mobile setup ──
    const isMobile = /Mobi|Android/i.test(navigator.userAgent);
    if (isMobile) {
      switchInputTab('upload');
      document.getElementById('fileInput').removeAttribute('capture');
    } else {
      switchInputTab('upload'); // default to upload on desktop too for simplicity
    }

    // ── Gallery ──
    let currentPage = 1;
    const PAGE_LIMIT = 9;

    async function loadGallery(page = currentPage) {
      const res = await fetch(`/imgs?page=${page}&limit=${PAGE_LIMIT}`);
      const { files, total, limit } = await res.json();
      const totalPages = Math.ceil(total / limit);
      currentPage = page;
      const grid = document.getElementById('gallery');
      const pag  = document.getElementById('pagination');
      if (!total) {
        grid.innerHTML = '<p class="gallery-empty">No images yet</p>';
        pag.style.display = 'none';
        return;
      }
      grid.innerHTML = files.map(f => `
        <div class="img-cell" id="cell-${f}" onclick="selectCell('${f}')">
          <img src="/imgs/${f}" title="${f}" />
          <div class="actions">
            <button class="scan-btn" onclick="event.stopPropagation(); scanImage('${f}', this)">Scan</button>
            <button class="del-btn"  onclick="event.stopPropagation(); deleteImage('${f}')">Del</button>
          </div>
        </div>
      `).join('');
      pag.style.display = totalPages > 1 ? 'flex' : 'none';
      document.getElementById('pageInfo').textContent = `${page} / ${totalPages}`;
      document.getElementById('prevBtn').disabled = page <= 1;
      document.getElementById('nextBtn').disabled = page >= totalPages;
    }

    function changePage(dir) { loadGallery(currentPage + dir); }

    let selectedCell = null;
    function selectCell(filename) {
      if (selectedCell && selectedCell !== filename) {
        document.getElementById(`cell-${selectedCell}`)?.classList.remove('selected');
      }
      const cell = document.getElementById(`cell-${filename}`);
      const isSelected = cell.classList.toggle('selected');
      selectedCell = isSelected ? filename : null;
    }

    async function deleteAll() {
      if (!confirm('Delete all images? This cannot be undone.')) return;
      const res  = await fetch('/imgs', { method: 'DELETE' });
      const data = await res.json();
      setStatus(`Deleted ${data.deleted} image(s)`);
      loadGallery();
    }

    async function deleteImage(filename) {
      if (!confirm(`Delete ${filename}?`)) return;
      await fetch(`/imgs/${filename}`, { method: 'DELETE' });
      setStatus(`Deleted ${filename}`);
      loadGallery();
    }

    // ── Scan ──
    async function scanImage(filename, btn) {
      btn.disabled = true;
      btn.textContent = '…';
      setStatus(`Scanning…`);
      try {
        const res  = await fetch(`/scan/${filename}`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(data.error));
        setStatus(`Done — ${data.mdFile}`);
        showResult(filename, data.mdFile, data.markdown);
        loadNotes();
      } catch (e) {
        setStatus('Scan error: ' + e.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Scan';
      }
    }

    // ── Result ──
    let lastMarkdown = '', lastMdFile = '';

    async function showResult(filename, mdFile, markdown) {
      lastMarkdown = markdown;
      lastMdFile   = mdFile;
      document.getElementById('resultFilename').textContent = mdFile;
      const content = document.getElementById('resultContent');
      const html = marked.parse(markdown)
        .replace(/<li>\[ \]/g, '<li><input type="checkbox" disabled>')
        .replace(/<li>\[x\]/gi, '<li><input type="checkbox" disabled checked>');
      content.innerHTML = html;

      const mermaidBlocks = content.querySelectorAll('code.language-mermaid');
      for (const [i, block] of [...mermaidBlocks].entries()) {
        const graphDef = block.textContent.replace(/<br\s*\/?>/gi, ' ');
        const id = `mermaid-${Date.now()}-${i}`;
        try {
          const { svg } = await mermaid.render(id, graphDef);
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.innerHTML = svg;
          block.parentElement.replaceWith(div);
        } catch {
          const pre = document.createElement('pre');
          pre.textContent = graphDef;
          block.parentElement.replaceWith(pre);
        }
      }

      document.getElementById('nav-result').classList.add('has-result');
      showSection('result');
    }

    function copyResult() {
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(lastMarkdown).then(() => setStatus('Copied to clipboard!'));
      } else {
        // HTTP fallback for mobile
        const ta = document.createElement('textarea');
        ta.value = lastMarkdown;
        ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        setStatus('Copied to clipboard!');
      }
    }
    function downloadResult() {
      const blob = new Blob([lastMarkdown], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = lastMdFile || 'scan.md';
      a.click();
    }

    // ── Notes ──
    async function loadNotes() {
      const res   = await fetch('/scans');
      const files = await res.json();
      const list  = document.getElementById('notesList');
      if (!files.length) {
        list.innerHTML = '<p class="gallery-empty">No notes yet — scan an image to create one</p>';
        return;
      }
      list.innerHTML = files.map(f => `
        <div class="note-item" onclick="openNote('${f}')">
          <span class="note-icon">📄</span>
          <span class="note-name">${f.replace('.md', '')}</span>
          <button class="note-del" onclick="event.stopPropagation(); deleteNote('${f}')">Del</button>
        </div>
      `).join('');
    }

    async function openNote(filename) {
      const res      = await fetch(`/scans/${filename}`);
      const markdown = await res.text();
      showResult(filename, filename, markdown);
    }

    async function deleteNote(filename) {
      if (!confirm(`Delete ${filename}?`)) return;
      await fetch(`/scans/${filename}`, { method: 'DELETE' });
      loadNotes();
    }

    loadGallery();
    loadNotes();
  </script>
</body>
</html>
