<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NoteScaner</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2a2a2a;
      --accent: #2563eb;
      --accent-light: #3b82f6;
      --danger: #dc2626;
      --success: #10b981;
      --text: #eee;
      --muted: #777;
      --header-h: 54px;
      --nav-h: 64px;
    }

    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
      background: linear-gradient(180deg, #161616 0%, #0f0f0f 100%);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-brand svg {
      width: 20px; height: 20px;
      color: var(--accent-light);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    #status {
      font-size: 0.75rem;
      color: #6ee7b7;
      text-align: right;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #status.visible { opacity: 1; }
    #status.error { color: #f87171; }

    /* ── Main scrollable area ── */
    main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .section { display: none; padding: 16px; min-height: 100%; }
    .section.active {
      display: block;
      animation: fadeUp 0.18s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Bottom nav ── */
    nav {
      height: var(--nav-h);
      display: flex;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--surface);
    }
    nav button {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.62rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      padding: 6px 4px;
      transition: color 0.15s;
      position: relative;
    }
    nav button svg {
      width: 20px; height: 20px;
      transition: transform 0.15s;
    }
    nav button.active { color: var(--accent-light); }
    nav button.active svg { transform: scale(1.1); }
    nav button.active::after {
      content: '';
      position: absolute;
      top: 0; left: 22%; right: 22%;
      height: 2px;
      background: var(--accent-light);
      border-radius: 0 0 4px 4px;
    }
    nav button#nav-result .badge {
      position: absolute;
      top: 8px; right: calc(50% - 16px);
      width: 7px; height: 7px;
      background: var(--success);
      border-radius: 50%;
      display: none;
    }
    nav button#nav-result.has-result .badge { display: block; }

    /* ── Toast system ── */
    .toast-container {
      position: fixed;
      bottom: calc(var(--nav-h) + 12px + env(safe-area-inset-bottom));
      left: 16px; right: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.83rem;
      color: #e2e8f0;
      transform: translateY(12px);
      opacity: 0;
      transition: transform 0.22s ease, opacity 0.22s ease;
      pointer-events: auto;
      max-width: 100%;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-color: #7f1d1d; background: #1c0a0a; color: #fca5a5; }
    .toast.success { border-color: #064e3b; background: #0a1f17; color: #6ee7b7; }

    /* ── Scan overlay ── */
    .scan-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.82);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 150;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .scan-overlay.active { display: flex; }
    .scan-overlay-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .scan-spinner {
      width: 52px; height: 52px;
      border: 2.5px solid #1e3a5f;
      border-top-color: var(--accent-light);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .scan-overlay-label {
      font-size: 0.9rem;
      color: #94a3b8;
      letter-spacing: 0.06em;
    }
    .scan-overlay-sub {
      font-size: 0.75rem;
      color: #475569;
    }

    /* ── Shared components ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 12px;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; border-radius: 9px; font-size: 0.88rem; cursor: pointer;
      transition: all 0.15s; border: none; padding: 11px 16px; font-weight: 500;
    }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:active { background: #1e40af; transform: scale(0.98); }
    .btn-primary:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
    .btn-secondary {
      background: transparent; border: 1px solid #383838; color: #bbb;
    }
    .btn-secondary:hover { border-color: #666; color: #eee; }
    .btn-secondary:active { transform: scale(0.98); }
    .btn-danger { background: transparent; border: 1px solid #5f2120; color: #f87171; }
    .btn-danger:hover { border-color: var(--danger); background: rgba(220, 38, 38, 0.08); }
    .btn-row { display: flex; gap: 8px; width: 100%; }
    .btn-row .btn { flex: 1; }

    /* ── Scan section ── */
    .input-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .input-tab {
      flex: 1; padding: 9px; border: 1px solid #2c2c2c; border-radius: 8px;
      background: transparent; color: var(--muted); cursor: pointer; font-size: 0.83rem;
      transition: all 0.15s;
    }
    .input-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    #cameraSection, #uploadSection { display: none; flex-direction: column; gap: 12px; }
    #cameraSection.active, #uploadSection.active { display: flex; }

    video, #preview {
      width: 100%; border-radius: 10px; background: #000;
      max-height: 55vw; object-fit: cover;
    }

    .drop-zone {
      border: 2px dashed #2c2c2c; border-radius: 12px;
      padding: 40px 20px; text-align: center; color: #555;
      cursor: pointer; transition: all 0.2s;
      background: #111;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      color: #94a3b8;
      background: #0d1929;
    }
    .drop-zone input { display: none; }
    .drop-zone .drop-icon { margin-bottom: 10px; color: #444; }
    .drop-zone .drop-icon svg { width: 36px; height: 36px; }
    .drop-zone p { font-size: 0.88rem; margin-bottom: 4px; }
    .drop-zone small { font-size: 0.75rem; color: #3a3a3a; }

    #uploadPreview { display: none; width: 100%; border-radius: 10px; max-height: 280px; object-fit: contain; }

    /* ── Gallery section ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .img-cell {
      position: relative; border-radius: 8px; overflow: hidden;
      border: 2px solid transparent; transition: border-color 0.15s; aspect-ratio: 1;
    }
    .img-cell.selected { border-color: var(--accent); }
    .img-cell img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
    .img-cell .actions {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; gap: 2px; padding: 4px;
      background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 100%);
      opacity: 0; transition: opacity 0.15s;
    }
    .img-cell:hover .actions, .img-cell.selected .actions { opacity: 1; }
    .img-cell .actions button {
      flex: 1; padding: 5px 0; font-size: 0.7rem;
      border: none; border-radius: 4px; cursor: pointer; font-weight: 600;
      transition: filter 0.1s;
    }
    .img-cell .actions button:active { filter: brightness(0.85); }
    .img-cell .scan-btn { background: var(--accent); color: #fff; }
    .img-cell .scan-btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
    .img-cell .del-btn { background: rgba(185, 28, 28, 0.9); color: #fff; }

    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-top: 12px; font-size: 0.83rem; color: var(--muted);
    }
    .pagination button {
      padding: 6px 16px; background: transparent; border: 1px solid #333;
      border-radius: 6px; color: #aaa; cursor: pointer; font-size: 0.83rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .pagination button:hover:not(:disabled) { border-color: #666; color: #eee; }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

    .gallery-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 24px;
      color: #444;
      text-align: center;
      gap: 10px;
    }
    .empty-state svg { width: 44px; height: 44px; opacity: 0.25; }
    .empty-state p { font-size: 0.88rem; color: #555; }
    .empty-state small { font-size: 0.78rem; color: #3a3a3a; }

    /* ── Notes section ── */
    .notes-list { display: flex; flex-direction: column; gap: 6px; }
    .note-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 10px;
      background: #111; border: 1px solid #1f1f1f;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .note-item:hover { border-color: #333; background: #161616; }
    .note-item:active { background: #1a1f2e; border-color: var(--accent); }
    .note-icon { flex-shrink: 0; color: #475569; }
    .note-icon svg { width: 18px; height: 18px; }
    .note-info { flex: 1; overflow: hidden; }
    .note-name { font-size: 0.85rem; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .note-date { font-size: 0.72rem; color: #555; margin-top: 2px; }
    .note-del {
      background: transparent; border: 1px solid #2a2a2a; border-radius: 6px;
      color: #555; font-size: 0.72rem; padding: 4px 10px; cursor: pointer; flex-shrink: 0;
      transition: all 0.15s;
    }
    .note-del:hover { border-color: #7f1d1d; color: #f87171; background: rgba(185, 28, 28, 0.08); }

    /* ── Result section ── */
    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .result-header svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
    .result-filename {
      font-size: 0.78rem; color: var(--muted);
      word-break: break-all; flex: 1;
    }
    .result-toolbar {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .result-toolbar .btn { flex: 1; min-width: 120px; font-size: 0.83rem; padding: 9px; }

    /* ── Markdown body ── */
    .markdown-body { color: #d4d4d4; line-height: 1.72; font-size: 0.95rem; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #f1f5f9; }
    .markdown-body h1 { font-size: 1.25rem; margin: 1em 0 0.5em; border-bottom: 1px solid #1e293b; padding-bottom: 6px; }
    .markdown-body h2 { font-size: 1.05rem; margin: 0.9em 0 0.4em; }
    .markdown-body h3 { font-size: 0.95rem; margin: 0.8em 0 0.35em; color: #94a3b8; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.5em; }
    .markdown-body li { margin: 5px 0; }
    .markdown-body input[type="checkbox"] { margin-right: 6px; accent-color: var(--accent); }
    .markdown-body table { width: 100%; border-collapse: collapse; font-size: 0.87rem; margin: 12px 0; }
    .markdown-body th, .markdown-body td { border: 1px solid #1e293b; padding: 7px 10px; }
    .markdown-body th { background: #161f2e; color: #94a3b8; font-weight: 600; }
    .markdown-body tr:nth-child(even) td { background: #111820; }
    .markdown-body code { background: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: #93c5fd; }
    .markdown-body pre { background: #0f172a; padding: 14px; border-radius: 10px; overflow-x: auto; border: 1px solid #1e293b; margin: 12px 0; }
    .markdown-body pre code { background: none; padding: 0; color: #e2e8f0; }
    .markdown-body blockquote { border-left: 3px solid #334155; margin: 8px 0; padding: 4px 0 4px 14px; color: #64748b; }
    .markdown-body p { margin: 6px 0; }
    .markdown-body hr { border: none; border-top: 1px solid #1e293b; margin: 16px 0; }
    .markdown-body .mermaid {
      background: #0f172a; border: 1px solid #1e3a5f; border-radius: 12px;
      padding: 20px 12px; margin: 14px 0; overflow-x: auto; display: flex; justify-content: center;
    }
    .markdown-body .mermaid svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  </style>
</head>
<body>

  <!-- Fixed header -->
  <header>
    <div class="header-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <h1>NoteScaner</h1>
    </div>
    <span id="status"></span>
  </header>

  <!-- Scrollable content -->
  <main>

    <!-- SCAN -->
    <section id="sec-scan" class="section active">
      <div class="input-tabs">
        <button class="input-tab active" onclick="switchInputTab('camera')">Camera</button>
        <button class="input-tab" onclick="switchInputTab('upload')">Upload</button>
      </div>

      <div id="cameraSection" class="active">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none"></canvas>
        <div class="btn-row">
          <button class="btn btn-secondary" id="startBtn" onclick="startCamera()">Start Camera</button>
          <button class="btn btn-primary" id="snapBtn" onclick="snap()" disabled>Capture</button>
        </div>
        <img id="preview" style="display:none" />
        <div class="btn-row" id="saveRow" style="display:none">
          <button class="btn btn-secondary" onclick="discardSnap()">Retake</button>
          <button class="btn btn-primary" onclick="saveSnap()">Save Image</button>
        </div>
      </div>

      <div id="uploadSection">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
             ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="onFileSelected(event)" />
          <div class="drop-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <p id="dropText">Tap to take a photo or choose from gallery</p>
          <small>JPG · PNG · up to 20 MB</small>
        </div>
        <img id="uploadPreview" />
        <button class="btn btn-primary" id="uploadBtn" onclick="uploadFile()" style="display:none">Save Image</button>
      </div>
    </section>

    <!-- IMAGES -->
    <section id="sec-images" class="section">
      <div class="gallery-header">
        <span class="card-title" style="margin:0">Images</span>
        <button class="btn btn-danger" style="padding:6px 12px;font-size:0.75rem;border-radius:6px" onclick="deleteAll()">Delete All</button>
      </div>
      <div class="gallery-grid" id="gallery"></div>
      <div class="pagination" id="pagination" style="display:none">
        <button id="prevBtn" onclick="changePage(-1)">← Prev</button>
        <span id="pageInfo"></span>
        <button id="nextBtn" onclick="changePage(1)">Next →</button>
      </div>
    </section>

    <!-- NOTES -->
    <section id="sec-notes" class="section">
      <div class="gallery-header">
        <span class="card-title" style="margin:0">Saved Notes</span>
        <button class="btn btn-secondary" style="padding:6px 12px;font-size:0.75rem;border-radius:6px" onclick="loadNotes()">Refresh</button>
      </div>
      <div class="notes-list" id="notesList"></div>
    </section>

    <!-- RESULT -->
    <section id="sec-result" class="section">
      <div class="result-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <polyline points="9 15 11 17 15 13"/>
        </svg>
        <div class="result-filename" id="resultFilename"></div>
      </div>
      <div class="result-toolbar">
        <button class="btn btn-secondary" onclick="copyResult()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy MD
        </button>
        <button class="btn btn-primary" onclick="downloadResult()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download .md
        </button>
      </div>
      <div class="markdown-body" id="resultContent"></div>
    </section>

  </main>

  <!-- Bottom nav -->
  <nav>
    <button id="nav-scan" class="active" onclick="showSection('scan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Scan
    </button>
    <button id="nav-images" onclick="showSection('images')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
      Images
    </button>
    <button id="nav-notes" onclick="showSection('notes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      Notes
    </button>
    <button id="nav-result" onclick="showSection('result')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <polyline points="9 15 11 17 15 13"/>
      </svg>
      Result
      <span class="badge"></span>
    </button>
  </nav>

  <!-- Scan progress overlay -->
  <div class="scan-overlay" id="scanOverlay">
    <div class="scan-overlay-inner">
      <div class="scan-spinner"></div>
      <p class="scan-overlay-label">Scanning…</p>
      <p class="scan-overlay-sub">Processing with Gemini</p>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ── Navigation ──
    function showSection(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById(`sec-${name}`).classList.add('active');
      document.getElementById(`nav-${name}`).classList.add('active');
    }

    // ── Input tabs ──
    function switchInputTab(tab) {
      document.querySelectorAll('.input-tab').forEach((t, i) =>
        t.classList.toggle('active', (i === 0) === (tab === 'camera'))
      );
      document.getElementById('cameraSection').classList.toggle('active', tab === 'camera');
      document.getElementById('uploadSection').classList.toggle('active', tab === 'upload');
    }

    // ── Status (header, subtle) ──
    const statusEl = document.getElementById('status');
    let statusTimer = null;
    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = (isError ? 'error' : '') + (msg ? ' visible' : '');
      clearTimeout(statusTimer);
      if (msg) statusTimer = setTimeout(() => statusEl.classList.remove('visible'), 4000);
    }

    // ── Toast ──
    function showToast(msg, type = '') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast${type ? ' ' + type : ''}`;
      toast.textContent = msg;
      container.appendChild(toast);
      requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3200);
    }

    // ── Scan overlay ──
    const scanOverlay = document.getElementById('scanOverlay');
    function setScanOverlay(visible) {
      scanOverlay.classList.toggle('active', visible);
    }

    // ── Camera ──
    let stream = null, snapBlob = null;
    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const snapBtn = document.getElementById('snapBtn');
    const saveRow = document.getElementById('saveRow');

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        video.srcObject = stream;
        snapBtn.disabled = false;
        document.getElementById('startBtn').disabled = true;
        setStatus('Camera ready');
      } catch (e) {
        setStatus('Camera error: ' + e.message, true);
        showToast('Camera error: ' + e.message, 'error');
      }
    }

    function snap() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.toBlob(blob => {
        snapBlob = blob;
        preview.src = URL.createObjectURL(blob);
        preview.style.display = 'block';
        video.style.display = 'none';
        saveRow.style.display = 'flex';
        snapBtn.disabled = true;
        setStatus('Preview ready — save or retake');
      }, 'image/jpeg', 0.92);
    }

    function discardSnap() {
      snapBlob = null;
      preview.style.display = 'none';
      video.style.display = 'block';
      saveRow.style.display = 'none';
      snapBtn.disabled = false;
      setStatus('');
    }

    async function saveSnap() {
      if (!snapBlob) return;
      const form = new FormData();
      form.append('image', snapBlob, 'capture.jpg');
      await sendUpload(form);
      discardSnap();
    }

    // ── Upload ──
    let uploadFileObj = null;
    function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
    function onDragLeave() { document.getElementById('dropZone').classList.remove('drag-over'); }
    function onDrop(e) {
      e.preventDefault();
      document.getElementById('dropZone').classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) previewUpload(file);
    }
    function onFileSelected(e) { if (e.target.files[0]) previewUpload(e.target.files[0]); }

    function previewUpload(file) {
      uploadFileObj = file;
      const up = document.getElementById('uploadPreview');
      up.src = URL.createObjectURL(file);
      up.style.display = 'block';
      document.getElementById('uploadBtn').style.display = 'block';
      setStatus('Ready to save');
    }

    async function uploadFile() {
      if (!uploadFileObj) return;
      const form = new FormData();
      form.append('image', uploadFileObj, uploadFileObj.name);
      await sendUpload(form);
      uploadFileObj = null;
      document.getElementById('uploadPreview').style.display = 'none';
      document.getElementById('uploadBtn').style.display = 'none';
    }

    async function sendUpload(form) {
      setStatus('Saving...');
      try {
        const res  = await fetch('/upload', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Upload failed');
        setStatus(`Saved — ${data.filename}`);
        showToast(`Saved: ${data.filename}`, 'success');
        loadGallery();
        showSection('images');
      } catch (e) {
        setStatus(e.message, true);
        showToast(e.message, 'error');
      }
    }

    // ── Mermaid & Marked ──
    mermaid.initialize({
      startOnLoad: false, theme: 'dark', securityLevel: 'loose', useMaxWidth: true,
      themeVariables: {
        primaryColor: '#1e3a5f', primaryTextColor: '#e2e8f0', primaryBorderColor: '#334155',
        lineColor: '#64748b', secondaryColor: '#0f172a', tertiaryColor: '#1e293b',
        background: '#0f172a', mainBkg: '#1e293b', nodeBorder: '#334155',
        clusterBkg: '#1e293b', titleColor: '#94a3b8', edgeLabelBackground: '#1e293b',
        fontFamily: 'ui-monospace, monospace',
      },
      flowchart: { htmlLabels: false, curve: 'basis' },
    });
    marked.setOptions({ breaks: true, gfm: true });

    // ── Mobile setup ──
    const isMobile = /Mobi|Android/i.test(navigator.userAgent);
    if (isMobile) {
      switchInputTab('upload');
      document.getElementById('fileInput').removeAttribute('capture');
    } else {
      switchInputTab('upload');
    }

    // ── Gallery ──
    let currentPage = 1;
    const PAGE_LIMIT = 9;

    async function loadGallery(page = currentPage) {
      const res = await fetch(`/imgs?page=${page}&limit=${PAGE_LIMIT}`);
      const { files, total, limit } = await res.json();
      const totalPages = Math.ceil(total / limit);
      currentPage = page;
      const grid = document.getElementById('gallery');
      const pag  = document.getElementById('pagination');
      if (!total) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <p>No images yet</p>
            <small>Go to Scan to add your first image</small>
          </div>`;
        pag.style.display = 'none';
        return;
      }
      grid.innerHTML = files.map(f => `
        <div class="img-cell" id="cell-${f}" onclick="selectCell('${f}')">
          <img src="/imgs/${f}" title="${f}" loading="lazy" />
          <div class="actions">
            <button class="scan-btn" onclick="event.stopPropagation(); scanImage('${f}', this)">Scan</button>
            <button class="del-btn"  onclick="event.stopPropagation(); deleteImage('${f}')">Del</button>
          </div>
        </div>
      `).join('');
      pag.style.display = totalPages > 1 ? 'flex' : 'none';
      document.getElementById('pageInfo').textContent = `${page} / ${totalPages}`;
      document.getElementById('prevBtn').disabled = page <= 1;
      document.getElementById('nextBtn').disabled = page >= totalPages;
    }

    function changePage(dir) { loadGallery(currentPage + dir); }

    let selectedCell = null;
    function selectCell(filename) {
      if (selectedCell && selectedCell !== filename) {
        document.getElementById(`cell-${selectedCell}`)?.classList.remove('selected');
      }
      const cell = document.getElementById(`cell-${filename}`);
      const isSelected = cell.classList.toggle('selected');
      selectedCell = isSelected ? filename : null;
    }

    async function deleteAll() {
      if (!confirm('Delete all images? This cannot be undone.')) return;
      const res  = await fetch('/imgs', { method: 'DELETE' });
      const data = await res.json();
      showToast(`Deleted ${data.deleted} image(s)`);
      loadGallery();
    }

    async function deleteImage(filename) {
      if (!confirm(`Delete ${filename}?`)) return;
      await fetch(`/imgs/${filename}`, { method: 'DELETE' });
      showToast(`Deleted ${filename}`);
      loadGallery();
    }

    // ── Scan ──
    async function scanImage(filename, btn) {
      btn.disabled = true;
      btn.textContent = '…';
      setStatus(`Scanning…`);
      setScanOverlay(true);
      try {
        const res  = await fetch(`/scan/${filename}`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(data.error));
        showToast(`Scan complete — ${data.mdFile}`, 'success');
        showResult(filename, data.mdFile, data.markdown);
        loadNotes();
      } catch (e) {
        setStatus('Scan error: ' + e.message, true);
        showToast('Scan failed: ' + e.message, 'error');
      } finally {
        setScanOverlay(false);
        btn.disabled = false;
        btn.textContent = 'Scan';
      }
    }

    // ── Result ──
    let lastMarkdown = '', lastMdFile = '';

    async function showResult(filename, mdFile, markdown) {
      lastMarkdown = markdown;
      lastMdFile   = mdFile;
      document.getElementById('resultFilename').textContent = mdFile;
      const content = document.getElementById('resultContent');
      const html = marked.parse(markdown)
        .replace(/<li>\[ \]/g, '<li><input type="checkbox" disabled>')
        .replace(/<li>\[x\]/gi, '<li><input type="checkbox" disabled checked>');
      content.innerHTML = html;

      const mermaidBlocks = content.querySelectorAll('code.language-mermaid');
      for (const [i, block] of [...mermaidBlocks].entries()) {
        const graphDef = block.textContent.replace(/<br\s*\/?>/gi, ' ');
        const id = `mermaid-${Date.now()}-${i}`;
        try {
          const { svg } = await mermaid.render(id, graphDef);
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.innerHTML = svg;
          block.parentElement.replaceWith(div);
        } catch {
          const pre = document.createElement('pre');
          pre.textContent = graphDef;
          block.parentElement.replaceWith(pre);
        }
      }

      document.getElementById('nav-result').classList.add('has-result');
      showSection('result');
    }

    function copyResult() {
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(lastMarkdown).then(() => showToast('Copied to clipboard!', 'success'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = lastMarkdown;
        ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Copied to clipboard!', 'success');
      }
    }

    function downloadResult() {
      const blob = new Blob([lastMarkdown], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = lastMdFile || 'scan.md';
      a.click();
    }

    // ── Notes ──
    function formatNoteDate(filename) {
      const match = filename.match(/scan_(\d+)/);
      if (!match) return '';
      const ts = parseInt(match[1]);
      if (!ts) return '';
      try {
        return new Date(ts).toLocaleString(undefined, {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });
      } catch { return ''; }
    }

    async function loadNotes() {
      const res   = await fetch('/scans');
      const files = await res.json();
      const list  = document.getElementById('notesList');
      if (!files.length) {
        list.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <p>No notes yet</p>
            <small>Scan an image to create your first note</small>
          </div>`;
        return;
      }
      list.innerHTML = files.map(f => `
        <div class="note-item" onclick="openNote('${f}')">
          <span class="note-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </span>
          <div class="note-info">
            <div class="note-name">${f.replace('.md', '')}</div>
            ${formatNoteDate(f) ? `<div class="note-date">${formatNoteDate(f)}</div>` : ''}
          </div>
          <button class="note-del" onclick="event.stopPropagation(); deleteNote('${f}')">Del</button>
        </div>
      `).join('');
    }

    async function openNote(filename) {
      const res      = await fetch(`/scans/${filename}`);
      const markdown = await res.text();
      showResult(filename, filename, markdown);
    }

    async function deleteNote(filename) {
      if (!confirm(`Delete ${filename}?`)) return;
      await fetch(`/scans/${filename}`, { method: 'DELETE' });
      showToast(`Deleted ${filename.replace('.md', '')}`);
      loadNotes();
    }

    loadGallery();
    loadNotes();
  </script>
</body>
</html>
